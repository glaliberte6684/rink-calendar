name: Scrape Rink Schedules

on:
  schedule:
    # Runs every 4 hours (at 12, 16, 20, 00, 04, 08 UTC = 7am, 11am, 3pm, 7pm, 11pm, 3am Central)
    - cron: "0 */4 * * *"
  workflow_dispatch:          # lets you trigger it manually from GitHub

permissions:
  contents: write             # needed to commit the updated .ics back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OUTPUT_DIR: public
        run: python scripts/scrape.py

      - name: Commit updated calendar
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/rink-schedule.ics public/summary.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update rink schedule $(date -u +'%Y-%m-%d')"
          git push
